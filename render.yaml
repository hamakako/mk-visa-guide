services:
  - type: web
    name: mk-visa-guide
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_TRANSLATION_MODEL
        value: gemini-2.5-flash
      - key: DAILY_AI_LIMIT
        value: 100
      - key: VISA_CACHE_TTL_HOURS
        value: 168
